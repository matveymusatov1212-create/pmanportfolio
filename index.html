function copyToClipboard(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(msg));
  } else {
    const el = document.createElement('textarea');
    el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el); el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast(msg);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓  ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #f0ece4;
  --bg2:     #e4ded4;
  --line:    rgba(0,0,0,0.10);
  --black:   #0f0e0c;
  --dark:    #1a1916;
  --mid:     #4a4540;
  --muted:   #9a9590;
  --accent:  #c04a1a;
  --mono:    'Space Mono', monospace;
  --sans:    'Manrope', sans-serif;
  --serif:   'EB Garamond', Georgia, serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

/* Manrope for all UI text */
.topbar-studio, .topbar-right,
.row-meta-cell, .row-meta-cell .meta-val,
.row-view, .row-arrow,
.proj-back, .proj-topbar-mid, .proj-topbar-idx,
.spec-cell, .spec-val, .spec-key,
.proj-cat, .nav-item,
.slide-counter, .slide-ph-lbl,
.gallery-dots,
.proj-task-lbl {
  font-family: var(--sans) !important;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--black);
  font-family: var(--sans);
  font-size: 10px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.screen {
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.screen.active { opacity: 1; pointer-events: all; }
#screen-project { transform: translateX(24px); }
#screen-project.active { transform: translateX(0); }

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 31;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: calc(var(--safe-top) + 10px) 14px 10px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.topbar-studio { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--black); }
.topbar-studio span { color: var(--muted); }
.topbar-right  { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

/* ── PROJECT ROW ── */
.project-row {
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}
.project-row:active { opacity: 0.85; }

.row-photo {
  width: 100%; aspect-ratio: 16/10;
  background: var(--bg2);
  position: relative; overflow: hidden;
}
.row-photo img { width:100%;height:100%;object-fit:cover;display:block; }

.row-num {
  position: absolute; bottom: -4px; left: 8px;
  font-family: var(--mono);
  font-size: clamp(56px, 20vw, 88px);
  line-height: 0.85; color: #F0965A; opacity: 1;
  letter-spacing: -0.04em; pointer-events: none;
}

.row-tag {
  position: absolute; top: 10px; right: 10px;
  font-family: var(--mono); font-size: 8px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--bg); background: rgba(15,14,12,0.50);
  padding: 3px 8px; backdrop-filter: blur(4px);
}

.row-photo-placeholder {
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background: linear-gradient(135deg, #e8e2d8 0%, #ddd7cc 100%);
}
.row-photo-placeholder span {
  font-family: var(--mono); font-size: 9px;
  letter-spacing:.18em; color: var(--muted); text-transform:uppercase;
}

.row-meta {
  display: grid; grid-template-columns: 1fr 1fr 1fr auto;
  border-top: 1px solid var(--line);
}
.row-meta-cell {
  padding: 8px 11px; border-right: 1px solid var(--line);
  font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
}
.row-meta-cell:last-child { border-right: none; }
.meta-label { color: var(--muted); display: block; margin-bottom: 2px; font-size: 8px; }
.meta-val { color: var(--black); }
.row-view { padding: 8px 11px; font-family: var(--mono); font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; }

.row-title-block {
  padding: 13px 14px 17px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
.row-title-text {
  font-family: var(--sans); font-size: 15px; font-weight: 400;
  line-height: 1.25; color: var(--dark); font-style: normal; flex: 1;
}
.row-arrow { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-top: 2px; }

/* ── TOP NAV ── */
.bottom-nav {
  position: fixed; top: 38px; left: 0; right: 0;
  background: var(--bg); border-bottom: 1px solid var(--line);
  display: flex; z-index: 30;
}
.nav-item {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 11px 4px 9px; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  font-family: var(--sans); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--muted); transition: color 0.2s;
  gap: 5px; border-right: 1px solid var(--line);
}
.nav-item:last-child { border-right: none; }
.nav-item.active { color: var(--black); font-weight: 800; }
.nav-dot { width: 4px; height: 4px; border-radius: 50%; background: #F0965A; opacity: 0; transition: opacity 0.2s; }
.nav-item.active .nav-dot { opacity: 1; }
.nav-spacer { height: calc(82px + var(--safe-top)); }

/* ── PROJECT SCREEN ── */
.proj-topbar {
  position: sticky; top: 0; z-index: 20; background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: calc(var(--safe-top) + 10px) 14px 10px;
  display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px;
}
.proj-back {
  cursor: pointer; font-family: var(--mono); font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted);
  -webkit-tap-highlight-color: transparent;
}
.proj-topbar-mid { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); text-align: center; }
.proj-topbar-idx { font-family: var(--mono); font-size: 9px; color: var(--accent); }

.proj-gallery {
  width: 100%; overflow-x: auto; overflow-y: hidden;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  display: flex; scrollbar-width: none;
}
.proj-gallery::-webkit-scrollbar { display: none; }

.gallery-slide {
  flex: 0 0 100%; scroll-snap-align: start;
  aspect-ratio: 4/3; background: var(--bg2);
  position: relative; overflow: hidden;
}
.gallery-slide img { width:100%;height:100%;object-fit:cover;display:block; }
.slide-placeholder {
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,#e8e2d8,#ddd7cc);
}
.slide-ph-num { font-family:var(--mono);font-size:60px;color:var(--accent);opacity:.14;line-height:1; }
.slide-ph-lbl { font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase; }
.slide-counter {
  position:absolute;bottom:10px;right:12px;
  font-family:var(--mono);font-size:8px;
  color:var(--bg);background:rgba(15,14,12,.5);
  padding:3px 8px;letter-spacing:.1em;backdrop-filter:blur(4px);
}

.gallery-dots { display:flex;justify-content:center;gap:5px;padding:10px 0 0; }
.dot { width:3px;height:3px;border-radius:50%;background:var(--line);transition:all .2s; }
.dot.active { background:var(--accent);width:12px;border-radius:2px; }

.proj-specs-row {
  display:grid;grid-template-columns:1fr 1fr 1fr;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  margin-top:14px;
}
.spec-cell {
  padding:10px 13px;border-right:1px solid var(--line);
  font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;
}
.spec-cell:last-child{border-right:none;}
.spec-key{color:var(--muted);display:block;font-size:8px;margin-bottom:3px;}
.spec-val{color:var(--black);}

.proj-body { padding: 20px 14px 0; }
.proj-cat { font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.2em;color:var(--accent);margin-bottom:10px; }
.proj-title { font-family:var(--sans);font-size:22px;font-weight:500;line-height:1.15;color:var(--dark);margin-bottom:22px; }
.proj-task-lbl { font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:10px;display:block; }
.proj-task-text { font-family:var(--sans);font-size:13px;font-weight:300;line-height:1.8;color:var(--mid); }
.proj-spacer { height: calc(60px + var(--safe-bot)); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--black); color: #fff;
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  padding: 10px 20px; border-radius: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

document.getElementById('bottom-nav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  activeFilter = item.dataset.filter;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  item.classList.add('active');
  document.getElementById('screen-home').scrollTop = 0;
  renderList();
});

function openProject(idx) {
  const p = PROJECTS[idx];
  const num = String(idx + 1).padStart(2, '0');

  // Gallery
  const gallery = document.getElementById('proj-gallery');
  const dotsEl  = document.getElementById('gallery-dots');
  gallery.innerHTML = ''; dotsEl.innerHTML = '';
  const slides = p.images?.length ? p.images : [null, null, null];

  slides.forEach((src, si) => {
    const slide = document.createElement('div');
    slide.className = 'gallery-slide';
    slide.innerHTML = src
      ? `<img src="${src}" alt="Render ${si+1}" loading="lazy">`
      : `<div class="slide-placeholder"><div class="slide-ph-num">${num}</div><div class="slide-ph-lbl">Render ${si+1}</div></div>`;
    const ctr = document.createElement('div');
    ctr.className = 'slide-counter';
    ctr.textContent = `${si+1} / ${slides.length}`;
    slide.appendChild(ctr);
    gallery.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (si===0?' active':'');
    dotsEl.appendChild(dot);
  });

  gallery.addEventListener('scroll', () => {
    const i = Math.round(gallery.scrollLeft / gallery.offsetWidth);
    dotsEl.querySelectorAll('.dot').forEach((d,j) => d.classList.toggle('active', j===i));
  }, {passive:true});

  document.getElementById('proj-idx-top').textContent = `${num}/${String(PROJECTS.length).padStart(2,'0')}`;
  document.getElementById('proj-cat').textContent   = p.typeLabel;
  document.getElementById('proj-title').textContent = p.title;
  document.getElementById('proj-task').textContent  = p.description;

  document.getElementById('proj-specs').innerHTML = `
    <div class="spec-cell"><span class="spec-key">ГОД</span><span class="spec-val">${p.year}</span></div>
    <div class="spec-cell"><span class="spec-key">ПЛОЩАДЬ</span><span class="spec-val">${p.area}</span></div>
    <div class="spec-cell"><span class="spec-key">ЛОКАЦИЯ</span><span class="spec-val">${p.location}</span></div>`;

  const home = document.getElementById('screen-home');
  const proj = document.getElementById('screen-project');
  home.classList.remove('active');
  proj.classList.add('active');
  proj.scrollTop = 0; gallery.scrollLeft = 0;

  if (window.Telegram?.WebApp) {
    Telegram.WebApp.BackButton.show();
    Telegram.WebApp.BackButton.onClick(goBack);
  }
}

function goBack() {
  document.getElementById('screen-project').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
  if (window.Telegram?.WebApp) Telegram.WebApp.BackButton.hide();
}

document.getElementById('btn-back').addEventListener('click', goBack);
renderList();

function copyToClipboard(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(msg));
  } else {
    const el = document.createElement('textarea');
    el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el); el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast(msg);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓  ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
